name: Bug Report
description: Create a report to help us improve
title: "BUG: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior. Include a minimal Go snippet if possible.
      placeholder: |
        1. Call `termimage.Display(...)` with '...'
        2. See output / error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots of the terminal output.

  - type: input
    id: termimage-version
    attributes:
      label: termimage version
      placeholder: "e.g. v0.1.0 or commit SHA"

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: "Run `go version` to find out."
      placeholder: "e.g. go1.26.3"

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS version
      placeholder: "e.g. macOS 14, Ubuntu 24.04, Windows 11"

  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - amd64 (x86_64)
        - arm64 (aarch64 / Apple Silicon)
        - Other / unsure
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: "e.g. kitty, Ghostty, WezTerm, foot"

  - type: dropdown
    id: protocol
    attributes:
      label: Protocol in use
      options:
        - Auto
        - Kitty
        - Sixel
        - HalfBlock
        - Unknown

  - type: dropdown
    id: sandbox
    attributes:
      label: Sandbox mode
      options:
        - "Sandboxed: true"
        - "Sandboxed: false"
        - Unknown

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
