# Path → label rules for actions/labeler@v6 (PR file paths).

"area/build":
  - changed-files:
      - any-glob-to-any-file:
          - jwz.go

"area/subject":
  - changed-files:
      - any-glob-to-any-file:
          - subject.go

"area/docs":
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - README.md
          - "**/*.md"

"area/ci":
  - changed-files:
      - any-glob-to-any-file:
          - .goreleaser*.yml
          - .golangci.yml

"ci":
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**
          - .github/labeler-config.yml
          - .github/labeler-config-pr.yml
          - .github/labels.yml
          - .github/pr-paths.yml
          - .github/release.yml

"dependencies":
  - changed-files:
      - any-glob-to-any-file:
          - go.mod
          - go.sum
          - docs/package.json
          - docs/package-lock.json
